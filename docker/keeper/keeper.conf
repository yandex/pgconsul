[program:keeper_pre]
command=/opt/clickhouse-keeper/pre.sh
process_name=%(program_name)s
autostart=true
autorestart=true
stdout_logfile=/proc/self/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/self/fd/2
stderr_logfile_maxbytes=0
priority=100
user=root

[program:keeper]
command=/usr/bin/clickhouse-keeper --config-file=/etc/clickhouse-keeper/keeper_config.xml
environment=CLICKHOUSE_LOG="/var/log/clickhouse-keeper/clickhouse-keeper.log"
process_name=%(program_name)s
autostart=true
autorestart=true
stopsignal=TERM
log_level=debug
user=clickhouse
stdout_logfile=/proc/self/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/self/fd/2
stderr_logfile_maxbytes=0
priority=200
