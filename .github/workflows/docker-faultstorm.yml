name: Faultstorm tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  workflow_call:

jobs:
  test:
    name: faultstorm
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Test
        run: make faultstorm

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: logs
          path: logs
